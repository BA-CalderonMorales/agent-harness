# Multi-OS CD Workflow for agent-harness
# Builds and releases binaries for Linux, macOS, and Windows
# Supports both AMD64 and ARM64 architectures

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  # Build binaries for all platforms
  build:
    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          # Linux ARM64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          # macOS AMD64 (Intel)
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          # Windows AMD64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          # Windows ARM64
          - os: windows-latest
            goos: windows
            goarch: arm64
            suffix: windows-arm64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.GitSHA=${{ github.sha }}"
          go build -trimpath -ldflags="$ldflags" -o "dist/agent-harness-${{ matrix.suffix }}" ./cmd/agent-harness

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          cd dist
          tar czf "agent-harness-${{ matrix.suffix }}.tar.gz" "agent-harness-${{ matrix.suffix }}"
          rm "agent-harness-${{ matrix.suffix }}"

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "agent-harness-${{ matrix.suffix }}" -DestinationPath "agent-harness-${{ matrix.suffix }}.zip"
          Remove-Item "agent-harness-${{ matrix.suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-harness-${{ matrix.suffix }}
          path: dist/*
          retention-days: 1

  # Create release and upload assets
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: Docker image building removed - requires GitHub Container Registry
  # permissions that may not be available in all repositories.
  # 
  # To enable Docker builds in your fork:
  # 1. Go to Repository Settings → Actions → General
  # 2. Under "Workflow permissions", select "Read and write permissions"
  # 3. Go to Packages → Package settings
  # 4. Enable "Inherit access from source repository"
  # 5. Uncomment the docker job below
  #
  # See docs/ARCHITECTURE.md for the full Docker job configuration.
